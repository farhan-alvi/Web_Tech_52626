<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <link rel="stylesheet" href="DOM_Lab_Task.css">
</head>
<body>

<h2>Student Management System</h2>

<!-- Form to add student -->
<form id="student-form">
    <label for="student-roll">Roll No :</label>
    <input type="text" id="student-roll" placeholder="Enter Roll No">
    
    <label for="student-name">Student Name :</label>
    <input type="text" id="student-name" placeholder="Enter Student Name">
    
    <button type="submit" id="add-btn" disabled>Add</button>
</form>

<!-- Search box -->
<div class="search-section">
    <label for="search">Search Student :</label>
    <input type="text" id="search" placeholder="Type name to search">
</div>

<!-- Control buttons -->
<div class="button-section">
    <button id="sort-btn">Sort A–Z</button>
    <button id="highlight-btn">Highlight First Student</button>
</div>

<!-- Student list -->
<ul id="student-list"></ul>

<!-- Info -->
<p id="total">Total students: 0</p>
<p id="attendance">Present: 0 , Absent: 0</p>

<!-- Footer -->
<footer class="footer">
    &copy; 2026 Student Management System | Developed by Farhan Alvi (23-52626-2@student.aiub.edu)
</footer>

<script src="DOM_Lab_Task.js"></script>
</body>
</html>
